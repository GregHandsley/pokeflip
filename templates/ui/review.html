{% extends "ui/base.html" %}
{% block body %}
<h2>Review {{ uuid }}</h2>
<div style="display:flex; gap:12px">
  {% if front %}<img class="thumb" src="{{ front }}" alt="front">{% endif %}
  {% if back %}<img class="thumb" src="{{ back }}"  alt="back">{% endif %}
</div>
<form method="post" action="/review/{{ uuid }}" style="margin-top:12px">
  <div class="grid" style="grid-template-columns:repeat(2,minmax(220px,1fr))">
    <label>Name<input name="name" value="Charizard"></label>
    <label>Set Name<input name="set_name" value="Base Set"></label>
    <label>Set Code<input name="set_code" value="BS"></label>
    <label>Number<input name="number" value="4"></label>
    <label>Language
      <select name="language"><option>EN</option><option>JA</option><option>DE</option><option>FR</option><option>ES</option></select>
    </label>
    <label>Rarity<input name="rarity" value="Holo Rare"></label>
    <label>Holo (y=on)<input name="holo" value="y"></label>
    <label>Condition
      <select name="condition"><option>NM</option><option>LP</option><option>MP</option><option>HP</option><option>DMG</option></select>
    </label>
  </div>
  <button class="btn" type="submit" style="margin-top:12px">Create SKU & Stage</button>
</form>
{% endblock %}
