{% extends "ui/base.html" %}
{% block body %}
<h2>Review {{ uuid }}</h2>

<div class="card review-wrap">
  <!-- Left: images -->
  <div class="review-pair">
    {% if front %}<img class="review-img" src="{{ front }}" alt="front">{% endif %}
    {% if back  %}<img class="review-img" src="{{ back  }}" alt="back">{% endif %}
  </div>

  <!-- Right: form -->
  <div>
    {% if error %}<p class="alert err">{{ error }}</p>{% endif %}

    <form method="post" class="form-grid">
      <div class="field">
        <label>Name</label>
        <input name="name" value="{{ name or '' }}" required>
      </div>

      <div class="field">
        <label>Set Name</label>
        <input name="set_name" value="{{ set_name or '' }}" required>
      </div>

      <div class="field">
        <label>Set Code</label>
        <input name="set_code" value="{{ set_code or '' }}" required>
      </div>

      <div class="field">
        <label>Number</label>
        <input name="number" value="{{ number or '' }}" required>
      </div>

      <div class="field">
        <label>Language</label>
        <select name="language">
          {% for lang in ["EN","JA","FR","DE","ES","IT","PT","ZH","KO"] %}
            <option value="{{lang}}" {% if (language or 'EN')==lang %}selected{% endif %}>{{lang}}</option>
          {% endfor %}
        </select>
      </div>

      <div class="field">
        <label>Rarity</label>
        <select name="rarity">
          {% set rarities = ["Common","Uncommon","Rare","Reverse Holo","Holo Rare","Ultra Rare","Full Art","Trainer Gallery","Secret Rare","Promo"] %}
          {% for r in rarities %}
            <option value="{{ r }}" {% if (rarity or '')==r %}selected{% endif %}>{{ r }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="field">
        <label>Holo (y=on)</label>
        <select name="holo">
          <option value=""  {% if not holo %}selected{% endif %}>n</option>
          <option value="y" {% if holo %}selected{% endif %}>y</option>
        </select>
      </div>

      <div class="field">
        <label>Condition</label>
        <select name="condition">
          {% for c in ["NM","LP","MP","HP","DMG"] %}
            <option value="{{ c }}" {% if (condition or 'NM')==c %}selected{% endif %}>{{ c }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-actions">
        <button class="btn primary" type="submit">Create SKU & Move to Staged</button>
        <a class="btn" href="/pending">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
