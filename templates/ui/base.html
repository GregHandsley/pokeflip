<!doctype html><html><head>
    <meta charset="utf-8"/><title>Pokeflip</title>
    <style>
     body{font:14px/1.4 -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Ubuntu,Helvetica,Arial,sans-serif;margin:20px}
     .grid{display:grid;gap:16px;grid-template-columns:repeat(auto-fill,minmax(260px,1fr))}
     .card{border:1px solid #e5e7eb;border-radius:12px;padding:12px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
     .muted{color:#6b7280}
     .btn{display:inline-block;padding:6px 10px;border:1px solid #111;border-radius:8px;text-decoration:none;color:#111}
     .thumb{width:100%;max-width:240px;height:200px;object-fit:contain;background:#f8fafc;border:1px solid #e5e7eb;border-radius:10px}

    </style>
    </head><body>
    <header><h1>Pokeflip</h1></header>
    {% block body %}{% endblock %}
    </body></html>
