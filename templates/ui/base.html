<!doctype html><html><head>
    <meta charset="utf-8"/><title>Pokeflip</title>
    <style>
     body{font:14px/1.4 -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Ubuntu,Helvetica,Arial,sans-serif;margin:20px}
     .grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}
     .card{border:1px solid #e5e7eb;border-radius:12px;padding:12px}
     .muted{color:#6b7280}
     .btn{display:inline-block;padding:6px 10px;border:1px solid #111;border-radius:8px;text-decoration:none;color:#111}
    </style>
    </head><body>
    <header><h1>Pokeflip</h1></header>
    {% block body %}{% endblock %}
    </body></html>
