<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Pokeflip</title>
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
  <header>
    <h1>Pokeflip</h1>
    <nav>
      <a class="nav{% if request.url.path == '/' %} active{% endif %}" href="/">Dashboard</a>
      <a class="nav{% if request.url.path.startswith('/upload') %} active{% endif %}" href="/upload">Upload</a>
      <a class="nav{% if request.url.path.startswith('/pending') %} active{% endif %}" href="/pending">Pending</a>
      <a class="nav{% if request.url.path.startswith('/cards') %} active{% endif %}" href="/cards">Cards</a>
      <a class="nav{% if request.url.path.startswith('/sales') %} active{% endif %}" href="/sales">Sales</a>
    </nav>
  </header>

  {% block body %}{% endblock %}

  <script>
    // 1) Simple loading state for any form submit
    addEventListener('submit', e => {
      const btn = e.target.querySelector('button[type="submit"]');
      if (btn) { btn.classList.add('primary'); btn.disabled = true; btn.dataset.old = btn.textContent; btn.textContent = 'Working…'; }
    });

    // 2) Image modal used by /cards front/back links
    (function () {
      const modal = document.getElementById('img-modal');
      const img   = document.getElementById('img-modal-img');
      if (!modal || !img) return; // only active on pages that include the modal markup

      let lastFocus = null;

      function openModal(src, alt) {
        lastFocus = document.activeElement;
        img.src = src; img.alt = alt || '';
        modal.classList.remove('hidden');
        modal.focus({ preventScroll: true });
      }
      function closeModal() {
        img.src = ''; img.alt = '';
        modal.classList.add('hidden');
        if (lastFocus && lastFocus.focus) lastFocus.focus();
      }

      // Delegate link clicks
      document.addEventListener('click', (e) => {
        const a = e.target.closest('a.imglink');
        if (a) { e.preventDefault(); openModal(a.dataset.img, a.dataset.alt); }
        if (e.target.closest('#img-modal .close') || e.target === modal) { e.preventDefault(); closeModal(); }
      });

      // Escape to close
      document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

      modal.setAttribute('tabindex', '-1');
    })();
  </script>
</body>
</html>
