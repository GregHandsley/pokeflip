{% extends "ui/base.html" %}
{% block body %}
<div class="grid">
  <div class="card">
    <b>Unsorted</b>
    <div class="muted">{{ counts.unsorted }} files</div>
    <div class="row" style="margin-top:8px">
      <a class="btn" href="/upload">Upload</a>
      <form class="inline-form" method="post" action="/ingest">
        <button class="btn primary" type="submit">Ingest → Pending</button>
      </form>
    </div>
  </div>
  

  <div class="card">
    <b>Cards</b>
    <div class="muted">
      {{ counts.unsorted }} {{ 'file' if counts.unsorted == 1 else 'files' }}
    </div>
    <a class="btn" href="/cards">View</a>
  </div>
</div>
{% endblock %}
